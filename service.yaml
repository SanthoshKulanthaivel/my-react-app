apiVersion: v1
kind: Service
metadata:
  name: react-app-service
  namespace: dev-testing-santhosh
spec:
  type: NodePort
  selector:
    app: react-app              # ← Deployment label match
  ports:
    - port: 80
      targetPort: 5173          # ← Container port
      nodePort: 30099           # ← Browser access port